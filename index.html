<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Netflix Login Clone</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="overlay">
    <nav>
        <img src="images/logo.png" alt="logo">
    </nav>

    <input type="checkbox" id="toggle" hidden>

    <div class="container">

        <div class="box" id="login">
            <h2>로그인</h2>

            <div class="input-group">
                <input type="email" placeholder=" ">
                <label>이메일 주소 또는 전화번호</label>
            </div>

            <div class="input-group">
                <input type="password" placeholder=" ">
                <label>비밀번호</label>
            </div>

            <button>로그인</button>

            <p class="footer">
                Netflix 회원이 아니신가요?
                <label for="toggle"><span>지금 가입하세요</span></label>
            </p>
        </div>

        <div class="box" id="signup">
            <h2>회원가입</h2>

            <div class="input-group">
                <input type="text" placeholder=" ">
                <label>이름</label>
            </div>

            <div class="input-group">
                <input type="email" placeholder=" ">
                <label>이메일 주소 또는 전화번호</label>
            </div>

            <div class="input-group">
                <input type="password" placeholder=" ">
                <label>비밀번호</label>
            </div>

            <button>회원가입</button>

            <p class="footer">
                이미 회원이신가요?
                <label for="toggle"><span>로그인 하세요</span></label>
            </p>
        </div>

    </div>
</div>

</body>
</html>
